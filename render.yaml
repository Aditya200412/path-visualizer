# render.yaml  – lives at repo ROOT
# Deploys ONLY the Java backend on Render.
# The React frontend lives on Vercel separately.

services:
  - type: web
    name: pathfinder-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
