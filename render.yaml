# render.yaml  – lives at repo ROOT
# Deploys ONLY the Java backend on Render.
# The React frontend lives on Vercel separately.

services:
  - type: web
    name: pathfinder-api
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests --no-transfer-progress
    startCommand: java -jar target/pathfinding-visualizer-1.0.0.jar
    healthCheckPath: /api/health

    envVars:
      - key: PORT
        value: 8080

      # Paste your Anthropic key in Render dashboard → Environment
      - key: ANTHROPIC_API_KEY
        sync: false

      # Set this to your Vercel frontend URL after deploying frontend
      # e.g. https://path-visualiser.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
